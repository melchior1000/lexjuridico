// Garantir que o modal PDF seja fechado corretamente
function fecharPdfModal() {
  const modal = document.getElementById('pdf-modal');
  if (modal) modal.style.display = 'none';
  document.body.style.overflow = '';
  window._pdfAndamentos = [];
}

function abrirPdfParaCadastro(input) {
  const file = input.files[0];
  if (!file) return;
  const modal = document.getElementById('pdf-modal');
  if (modal) modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
  const prev = document.getElementById('pdf-file-preview');
  if (prev) prev.style.display = 'flex';
  document.getElementById('pdf-file-nome').textContent = file.name;
  document.getElementById('pdf-file-tamanho').textContent = (file.size/1024/1024).toFixed(1)+' MB';
  document.getElementById('pdf-file-status').textContent = 'Aguardando IA...';
  // limpar campos
  ['pdf-nome','pdf-num','pdf-partes','pdf-grupo','pdf-trib','pdf-prazo','pdf-proxacao','pdf-desc','pdf-frentes','pdf-valor'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  window._pdfAndamentos = [];
  extrairDadosPdf(file);
  input.value = '';
}
